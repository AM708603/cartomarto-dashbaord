<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartoMarto · secure login</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-gradient-start: #f1f5f9; --bg-gradient-end: #e4eaf1;
      --card-bg: rgba(255,255,255,0.75); --card-bg-solid: #ffffff;
      --card-border: rgba(255,255,255,0.6); --text-primary: #0f1825;
      --text-secondary: #334155; --text-muted: #5f6c80; --label-color: #1e2a44;
      --input-bg: rgba(255,255,255,0.9); --input-border: #dce5ef;
      --input-focus-border: #3b82f6; --primary: #2563eb; --primary-hover: #1d4ed8;
      --primary-soft: #dbeafe; --icon-default: #5f6c80; --icon-focus: #2563eb;
      --shadow-card: 0 25px 50px -12px rgba(0,0,0,0.25),0 0 0 1px rgba(255,255,255,0.7);
      --error-bg: #fee2e2; --error-text: #b91c1c; --theme-toggle-bg: #e2e8f0;
      --theme-toggle-icon: #f59e0b; --success: #059669;
      --particle-light: rgba(37,99,235,0.15); --particle-light-glow: rgba(59,130,246,0.25);
    }
    body.dark {
      --bg-gradient-start: #0b121c; --bg-gradient-end: #1a2635;
      --card-bg: rgba(20,30,45,0.7); --card-bg-solid: #1e2a3a;
      --card-border: rgba(74,95,120,0.5); --text-primary: #edf2f9;
      --text-secondary: #cbd5e1; --text-muted: #94a3b8; --label-color: #d1dff0;
      --input-bg: rgba(30,41,59,0.9); --input-border: #334155;
      --input-focus-border: #60a5fa; --primary: #3b82f6; --primary-hover: #2563eb;
      --primary-soft: #1e3a5f; --icon-default: #94a3b8; --icon-focus: #60a5fa;
      --shadow-card: 0 25px 40px -12px #000000cc,0 0 0 1px rgba(255,255,255,0.05);
      --error-bg: #451a1a; --error-text: #fca5a5; --theme-toggle-bg: #2d3a4f;
      --theme-toggle-icon: #fbbf24; --success: #10b981;
      --particle-light: rgba(96,165,250,0.12); --particle-light-glow: rgba(59,130,246,0.2);
    }
    body {
      font-family: "Inter", sans-serif; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; margin: 0; transition: background 0.5s ease;
      position: relative;
      background: radial-gradient(circle at 30% 40%, var(--bg-gradient-start), var(--bg-gradient-end));
      overflow-x: hidden;
    }
    .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: orbFloat 20s infinite alternate ease-in-out; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle at 30% 30%,#3b82f6,#8b5cf6); top: -200px; right: -200px; animation-duration: 25s; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle at 70% 70%,#10b981,#3b82f6); bottom: -200px; left: -150px; animation-duration: 30s; animation-delay: -5s; }
    .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle at 50% 50%,#f59e0b,#ec4899); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-duration: 35s; animation-delay: -10s; opacity: 0.2; }
    @keyframes orbFloat { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(5%,5%) scale(1.2); } }
    #networkCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
    .particle { position: absolute; background: var(--particle-light); border-radius: 50%; box-shadow: 0 0 30px var(--particle-light-glow); backdrop-filter: blur(1px); animation: floatParticle linear infinite; will-change: transform, opacity; }
    @keyframes floatParticle { 0% { transform: translateY(100vh) scale(0.8) rotate(0deg); opacity: 0.2; } 20% { opacity: 0.6; } 80% { opacity: 0.4; } 100% { transform: translateY(-20vh) scale(1.5) rotate(360deg); opacity: 0; } }
    .login-card { background: var(--card-bg); backdrop-filter: blur(20px) saturate(200%); -webkit-backdrop-filter: blur(20px) saturate(200%); border-radius: 2.5rem; padding: 2.8rem 2.5rem; max-width: 460px; width: 100%; box-shadow: var(--shadow-card); border: 1px solid var(--card-border); transition: background 0.3s, border-color 0.3s, box-shadow 0.4s, transform 0.3s; animation: cardAppear 0.9s cubic-bezier(0.15,0.85,0.35,1.05); position: relative; z-index: 10; }
    .login-card:hover { box-shadow: 0 35px 65px -15px #00000055,0 0 0 1px var(--card-border); }
    @keyframes cardAppear { 0% { opacity: 0; transform: translateY(40px) scale(0.96); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    .theme-switch { position: absolute; top: 1.8rem; right: 2rem; background: var(--theme-toggle-bg); border: none; width: 44px; height: 44px; border-radius: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--theme-toggle-icon); font-size: 1.4rem; box-shadow: 0 4px 18px rgba(0,0,0,0.15); transition: all 0.25s; z-index: 30; border: 1px solid rgba(255,255,255,0.3); }
    .theme-switch:hover { transform: scale(1.15) rotate(10deg); background: var(--primary-soft); }
    .logo-wrapper { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
    .logo-icon { width: 56px; height: 56px; background: linear-gradient(145deg,var(--primary),var(--primary-hover)); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; box-shadow: 0 12px 28px -10px var(--primary); transition: 0.2s; }
    .logo-text { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(to right,var(--text-primary),var(--primary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    h2 { font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; color: var(--text-primary); margin-bottom: 0.4rem; }
    .greeting { font-size: 1rem; color: var(--text-muted); margin-bottom: 2.2rem; font-weight: 400; border-left: 3px solid var(--primary); padding-left: 1rem; }
    .input-group { margin-bottom: 1.8rem; text-align: left; }
    .input-label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--label-color); }
    .input-field { position: relative; transition: transform 0.15s; }
    .input-field input { width: 100%; background: var(--input-bg); border: 1.5px solid var(--input-border); border-radius: 20px; padding: 1rem 3.2rem; font-size: 1rem; color: var(--text-primary); box-shadow: 0 4px 10px -4px rgba(0,0,0,0.05); transition: all 0.25s cubic-bezier(0.2,0.9,0.4,1); backdrop-filter: blur(4px); }
    .input-field i:first-of-type { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--icon-default); font-size: 1.2rem; transition: color 0.2s, transform 0.2s; pointer-events: none; }
    .password-toggle { position: absolute; right: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--icon-default); font-size: 1.2rem; cursor: pointer; transition: color 0.2s, transform 0.2s; z-index: 2; pointer-events: auto; }
    .password-toggle:hover { color: var(--icon-focus); transform: translateY(-50%) scale(1.1); }
    .input-field input:focus { outline: none; border-color: var(--input-focus-border); background: var(--card-bg-solid); box-shadow: 0 0 0 4px rgba(59,130,246,0.15),0 8px 18px rgba(0,0,0,0.1); transform: scale(1.01); }
    .action-btn { background: linear-gradient(145deg,var(--primary),var(--primary-hover)); color: white; border: none; border-radius: 40px; padding: 1rem 1.5rem; width: 100%; font-weight: 600; font-size: 1.1rem; margin: 1.5rem 0 1rem; box-shadow: 0 20px 30px -12px var(--primary); cursor: pointer; transition: all 0.3s cubic-bezier(0.23,1,0.32,1); display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden; }
    .action-btn::before { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent); transition: left 0.6s; }
    .action-btn:hover::before { left: 100%; }
    .action-btn:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 28px 38px -12px var(--primary-hover); }
    .error-block { background: var(--error-bg); color: var(--error-text); padding: 1rem; border-radius: 18px; font-size: 0.9rem; display: none; align-items: center; gap: 10px; margin-bottom: 1.2rem; border: 1px solid rgba(255,100,100,0.2); backdrop-filter: blur(4px); animation: shake 0.5s ease; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
    .support-link { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem; transition: gap 0.2s; }
    .support-link a { color: var(--primary); text-decoration: none; font-weight: 500; border-bottom: 1px dashed transparent; transition: border-color 0.2s; }
    .support-link a:hover { border-bottom: 1px dashed var(--primary); }
    .fa-spinner { animation: spin 0.8s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    input::placeholder { color: var(--text-muted); opacity: 0.5; font-weight: 300; }
    @media (max-width: 480px) { .login-card { padding: 2rem 1.5rem; } }
  </style>
</head>
<body>
  <div class="animated-bg" id="bgCanvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <canvas id="networkCanvas"></canvas>
  </div>

  <div class="login-card">
    <button class="theme-switch" id="themeToggle" aria-label="switch theme">
      <i class="fas fa-moon" id="themeIcon"></i>
    </button>
    <div class="logo-wrapper">
      <div class="logo-icon"><i class="fas fa-cart-shopping"></i></div>
      <span class="logo-text">CartoMarto</span>
    </div>
    <h2>Dashboard access</h2>
    <div class="greeting">
      <i class="fas fa-chevron-right" style="font-size:0.8rem;opacity:0.7;"></i> secure workspace
    </div>
    <div id="globalError" class="error-block">
      <i class="fas fa-exclamation-triangle"></i>
      <span id="errorText">Invalid credentials</span>
    </div>
    <form id="loginForm" novalidate>
      <div class="input-group">
        <label class="input-label" for="email">Email</label>
        <div class="input-field">
          <input type="email" id="email" placeholder="hello@cartomarto.com" required autocomplete="off">
          <i class="fas fa-envelope"></i>
        </div>
      </div>
      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <div class="input-field">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="off">
          <i class="fas fa-lock"></i>
          <i class="fas fa-eye password-toggle" id="togglePassword"></i>
        </div>
      </div>
      <button type="submit" class="action-btn" id="submitBtn">
        <span>sign in</span> <i class="fas fa-arrow-right"></i>
      </button>
    </form>
    <div class="support-link">
      <i class="fas fa-headset"></i>
      <span>need assistance? <a href="#">contact support</a></span>
    </div>
  </div>

  <script>
  (function() {
    // ── THEME TOGGLE ──
    const body = document.body;
    const themeIcon = document.getElementById('themeIcon');
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') { body.classList.add('dark'); themeIcon.className = 'fas fa-sun'; }
    else { themeIcon.className = 'fas fa-moon'; }
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      const isDark = body.classList.contains('dark');
      themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      initParticles();
    });

    // ── PASSWORD TOGGLE ──
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });

    // ── PARTICLE NETWORK (Canvas) ──
    const canvas = document.getElementById('networkCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [], animationFrame;
    let mouseX = 0, mouseY = 0, mouseInfluence = false;
    document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; mouseInfluence = true; });
    document.addEventListener('mouseleave', () => { mouseInfluence = false; });
    function resizeCanvas() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    function createParticles(count = 60) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({ x: Math.random()*width, y: Math.random()*height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, size: Math.random()*3+1, opacity: Math.random()*0.5+0.2 });
      }
    }
    function drawParticles() {
      ctx.clearRect(0, 0, width, height);
      particles.forEach(p => {
        if (mouseInfluence) { const dx=mouseX-p.x, dy=mouseY-p.y, dist=Math.sqrt(dx*dx+dy*dy); if(dist<200){ const f=(200-dist)/200*0.02; p.vx-=dx*f; p.vy-=dy*f; } }
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>width){ p.vx*=-0.9; p.x=Math.max(0,Math.min(width,p.x)); }
        if(p.y<0||p.y>height){ p.vy*=-0.9; p.y=Math.max(0,Math.min(height,p.y)); }
        p.vx+=(Math.random()-0.5)*0.02; p.vy+=(Math.random()-0.5)*0.02;
        const speed=Math.sqrt(p.vx*p.vx+p.vy*p.vy); if(speed>1){ p.vx=(p.vx/speed); p.vy=(p.vy/speed); }
      });
      const isDark = body.classList.contains('dark');
      for(let i=0;i<particles.length;i++) {
        for(let j=i+1;j<particles.length;j++) {
          const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<150) { const op=(150-dist)/150*0.3; ctx.strokeStyle=isDark?`rgba(96,165,250,${op})`:`rgba(37,99,235,${op})`; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke(); }
        }
      }
      particles.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.shadowColor=isDark?'#60a5fa':'#2563eb'; ctx.shadowBlur=15;
        ctx.fillStyle=isDark?`rgba(96,165,250,${p.opacity})`:`rgba(37,99,235,${p.opacity})`; ctx.fill(); ctx.shadowBlur=0;
      });
      animationFrame = requestAnimationFrame(drawParticles);
    }
    resizeCanvas(); createParticles(70); drawParticles();
    window.addEventListener('resize', () => { resizeCanvas(); createParticles(70); });
    window.addEventListener('beforeunload', () => { if(animationFrame) cancelAnimationFrame(animationFrame); });

    // ── CSS FLOATING PARTICLES ──
    const bgCanvas = document.getElementById('bgCanvas');
    function createParticle() {
      const p = document.createElement('div'); p.className = 'particle';
      const size = Math.random()*40+8; p.style.width=size+'px'; p.style.height=size+'px';
      p.style.left=Math.random()*100+'%';
      const dur=Math.random()*26+15; p.style.animation=`floatParticle ${dur}s linear infinite`;
      p.style.animationDelay=Math.random()*15+'s';
      return p;
    }
    function initParticles(count=35) {
      document.querySelectorAll('.particle').forEach(p=>p.remove());
      for(let i=0;i<count;i++) bgCanvas.appendChild(createParticle());
    }
    initParticles(42);
    setInterval(() => {
      const all = document.querySelectorAll('.particle');
      if(all.length>30) { for(let i=0;i<4;i++) { if(all[i]){ all[i].remove(); bgCanvas.appendChild(createParticle()); } } }
    }, 8000);

    // ── LOGIN FORM ──
    // FIX: Use the Cloudflare Worker URL directly (not window.location.origin)
    const API_URL = 'https://cartomarto-api.borntow2.workers.dev';

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const globalError = document.getElementById('globalError');
    const errorText = document.getElementById('errorText');

    [emailInput, passwordInput].forEach(input => {
      input.addEventListener('focus', () => { input.parentElement.style.transform='translateY(-2px)'; });
      input.addEventListener('blur',  () => { input.parentElement.style.transform='translateY(0)'; });
      input.addEventListener('input', () => { globalError.style.display='none'; });
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      globalError.style.display = 'none';
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) { errorText.innerText='Both fields are required'; globalError.style.display='flex'; return; }
      const originalHtml = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> authenticating...';
      submitBtn.disabled = true;
      try {
        const response = await fetch(`${API_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        if (!response.ok) {
          let errMsg = 'Login failed';
          try { const err = await response.json(); errMsg = err.error || errMsg; } catch {}
          throw new Error(errMsg);
        }
        const data = await response.json();
        if (data.token) localStorage.setItem('token', data.token);
        submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> success! redirecting';
        submitBtn.style.background = 'var(--success)';
        setTimeout(() => { location.replace('/'); }, 700);
      } catch (error) {
        submitBtn.innerHTML = originalHtml;
        submitBtn.disabled = false;
        errorText.innerText = error.message || 'Authentication error';
        globalError.style.display = 'flex';
        globalError.style.animation = 'none';
        globalError.offsetHeight;
        globalError.style.animation = 'shake 0.5s ease';
      }
    });
  })();
  </script>
</body>
</html>
